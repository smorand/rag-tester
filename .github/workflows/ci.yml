name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality gate (lint, typecheck, security, tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: make lint

      - name: Format check (ruff)
        run: make format-check

      - name: Type check (mypy strict)
        run: make typecheck

      - name: Security scan (bandit)
        run: make security

      - name: Tests with coverage (>= 80%)
        run: make test-cov

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need git history for `git describe` versioning

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        run: make docker-build
